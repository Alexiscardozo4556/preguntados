<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Juego - Preguntados</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="img/logo.png" alt="Logo Preguntados Web" class="logo-img">
        </div>
        <h1>Preguntados 🎯</h1>
        <!-- 🔹 Sin menú de navegación -->
    </header>

    <main class="game-container">
        <section id="quiz" class="quiz-box">
            <div class="status-bar">
                <p>Puntuación: <span id="puntos">0</span></p>
                <p id="pregunta-numero"></p>
            </div>
            <div class="pregunta-card">
                <h2 id="pregunta"></h2>
                <div id="opciones" class="opciones"></div>
            </div>
            <p id="resultado" class="resultado"></p>
        </section>
    </main>

    <footer>
        <p>© 2026 Preguntados Web | Creado por Cardozo</p>
        <p>Síguenos en redes:
            <a href="https://www.instagram.com/preguntados" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
            <a href="https://twitter.com/preguntados" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter"></i></a>
            <a href="https://www.youtube.com/@Preguntados" target="_blank" rel="noopener noreferrer"><i class="fab fa-youtube"></i></a>
        </p>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // 🔹 Al cargar la página, iniciar el quiz con la categoría y modo guardados
        window.addEventListener("DOMContentLoaded", () => {
            const categoria = localStorage.getItem("categoriaSeleccionada");
            const modo = localStorage.getItem("modoSeleccionado");

            if (categoria && modo) {
                categoriaActual = categoria;
                modoActual = modo;

                if (categoriaActual === "aleatorio") {
                    const todas = Object.values(preguntasPorCategoria).flat();
                    preguntas = todas.sort(() => Math.random() - 0.5).slice(0, 10);
                } else {
                    preguntas = preguntasPorCategoria[categoriaActual]
                        .sort(() => Math.random() - 0.5)
                        .slice(0, 10);
                }

                if (!preguntas || preguntas.length === 0) {
                    Swal.fire("Sin preguntas", "No hay preguntas para esta categoría", "warning");
                    return;
                }

                document.getElementById("quiz").style.display = "block";
                indiceActual = 0;
                puntos = 0;
                vidas = 3;
                document.getElementById("puntos").innerText = puntos;

                mostrarPregunta(indiceActual);
            } else {
                Swal.fire("Error", "No se seleccionó categoría ni modo", "error");
            }
        });
    </script>
</body>

</html>
